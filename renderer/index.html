<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>DnD Toolkit</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="logo">
        <div class="logo-icon">🐉</div>
        <div class="logo-text">DnD<br /><span>Toolkit</span></div>
      </div>
      <nav>
        <button class="nav-btn active" data-view="haendler">⚒️ <span>Händler</span></button>
        <button class="nav-btn" data-view="bibliothek">📜 <span>Bibliothek</span></button>
        <button class="nav-btn" data-view="kompendium">📖 <span>Kompendium</span></button>
        <button class="nav-btn" data-view="homebrew">🧪 <span>Homebrew</span></button>
        <button class="nav-btn" data-view="notizen">✒️ <span>Notizen</span></button>
        <button class="nav-btn" data-view="einstellungen">⚙️ <span>Einstellungen</span></button>
        <div class="nav-sep"></div>
        <button class="nav-btn" data-view="encounter">⚔️ <span>Encounter</span></button>
        <button class="nav-btn" data-view="stadt">🏰 <span>Städte</span></button>
      </nav>
      <div class="version" id="version"></div>
    </aside>
    <main id="main"><!-- Views werden per JS gerendert --></main>
  </div>
  <script src="js/generator.js"></script>
  <script src="js/foundry.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
